name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck bin/*.sh tests/*.sh

  tests:
    name: Behavior tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          set -eu
          for test_script in tests/*.test.sh; do
            "$test_script"
          done

  invariants:
    name: Repo invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Orchestrator prompt invariants
        run: |
          set -eu
          [ -f CLAUDE.md ] && [ ! -L CLAUDE.md ] || { echo "::error::CLAUDE.md must be a real file"; exit 1; }
          [ ! -e AGENTS.md ] || { echo "::error::AGENTS.md must not exist; CLAUDE.md is canonical"; exit 1; }
          [ "$(readlink .claude/skills)" = "../.agents/skills" ] || { echo "::error::.claude/skills must be a symlink to ../.agents/skills"; exit 1; }
      - name: Personal fleet paths must not be tracked
        run: |
          set -eu
          tracked=$(git ls-files -- data state config projects .no-mistakes)
          if [ -n "$tracked" ]; then
            echo "::error::Personal fleet paths are tracked in git:"
            printf '%s\n' "$tracked"
            exit 1
          fi
